  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sketchware Pro Hub is a mobile-first SaaS resource manager for Sketchware projects, Java code, custom blocks, libraries, and icons."
    />
    <meta name="theme-color" content="#f7f8fb" />
    <title>Sketchware Pro Hub</title>
    <link rel="preload" href="assets/hero-dashboard.png" as="image" />
